<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NECTRRA | ID Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0B0C10; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(116, 198, 157, 0.2); }
        
                .radar-sweep { position: absolute; top: 50%; left: 50%; width: 100vw; height: 100vw; max-width: 550px; max-height: 550px; transform: translate(-50%, -50%); background: conic-gradient(from 0deg, transparent 70%, rgba(116, 198, 157, 0.1) 80%, rgba(116, 198, 157, 0.4) 100%); border-radius: 50%; animation: sweep 4s linear infinite; pointer-events: none; }

        @keyframes sweep { to { transform: translate(-50%, -50%) rotate(360deg); } }

        @keyframes coinFlip {
            0% { transform: perspective(400px) rotateY(0deg); }
            50% { transform: perspective(400px) rotateY(180deg); }
            100% { transform: perspective(400px) rotateY(360deg); }
        }
        .animate-flip { animation: coinFlip 3s infinite ease-in-out; transform-style: preserve-3d; }
        .coin-face { backface-visibility: hidden; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .coin-front { transform: rotateY(0deg); }
        .coin-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center relative">

    <div class="radar-sweep"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0B0C10_70%)]"></div>

    <main class="relative z-10 w-[90%] max-w-sm">
        
        <div class="text-center mb-8">
            <div class="relative w-16 h-16 mx-auto mb-6 animate-flip">
                <div class="coin-face coin-front bg-[#2D6A4F] border-2 border-[#74C69D] shadow-[0_0_20px_rgba(116,198,157,0.5)]">
                    <span class="text-2xl">&#127811;</span>
                </div>
                <div class="coin-face coin-back bg-yellow-500 border-2 border-yellow-300 shadow-[0_0_20px_rgba(234,179,8,0.5)]">
                    <span class="text-2xl font-bold text-white">&#8377;</span>
                </div>
            </div>

            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-[#74C69D] tracking-widest uppercase mb-2">NECTRRA</h1>
            <p class="text-xs text-[#74C69D] font-mono tracking-widest uppercase">Global Identity Gateway</p>
        </div>

        <div class="glass-card p-8 rounded-3xl shadow-[0_0_40px_rgba(116,198,157,0.1)] text-center relative overflow-hidden">
            <div class="w-16 h-16 mx-auto bg-slate-800 rounded-full border-2 border-[#74C69D] flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(116,198,157,0.4)]">
                <svg class="w-8 h-8 text-[#74C69D]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
            </div>
            
            <h2 class="text-lg font-bold text-white mb-2">Initialize STRATA</h2>
            <p class="text-xs text-slate-400 mb-8 leading-relaxed">Sign in to securely access your carbon ledger and NECTRRA ecosystem data.</p>
            
            <button id="google-btn" class="w-full bg-white text-[#0B0C10] font-bold text-sm py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Authenticate with Google
            </button>
            <p id="status-text" class="text-xs text-[#74C69D] mt-4 font-mono hidden animate-pulse">Establishing secure connection...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFaSTwrX38nSEPudYm-8iJLwdoJXGCfM8",
            authDomain: "strata-ca81c.firebaseapp.com",
            projectId: "strata-ca81c",
            storageBucket: "strata-ca81c.firebasestorage.app",
            messagingSenderId: "863301861425",
            appId: "1:863301861425:web:a3b02f32b262df517e5510",
            measurementId: "G-PWVNP4LW7T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('google-btn').addEventListener('click', async () => {
            const btn = document.getElementById('google-btn');
            const status = document.getElementById('status-text');
            
            btn.classList.add('hidden');
            status.classList.remove('hidden');

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                status.innerText = "Verifying NECTRRA Identity...";

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                const data = userSnap.data() || {}; // Safety fallback

                // THE BULLETPROOF CHECK
                if (!userSnap.exists() || !data.accountType) {
                    status.innerText = "Provisioning Global Account...";
                    await setDoc(userRef, {
                        nectrraId: user.uid,
                        email: user.email || "No Email",
                        displayName: user.displayName || "Citizen",
                        accountType: "Citizen", 
                        ecosystemAccess: ["STRATA"],
                        lastLogin: new Date().toISOString()
                    }, { merge: true }); // Merge ensures we don't erase carbon data!
                } else {
                    await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
                }

                status.innerText = "Access Granted. Initializing...";
                
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000);

            } catch (error) {
                console.error("Auth Error:", error);
                status.innerText = "Authentication Failed. Try again.";
                setTimeout(() => {
                    btn.classList.remove('hidden');
                    status.classList.add('hidden');
                }, 3000);
            }
        });
    </script>
</body>
</html>
