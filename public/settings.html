<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATA | Profile Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0B0C10;
            background-image: linear-gradient(rgba(116, 198, 157, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(116, 198, 157, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(116, 198, 157, 0.1);
        }

        .input-field {
            width: 100%; background: rgba(11, 12, 16, 0.8); border: 1px solid rgba(116, 198, 157, 0.3);
            color: #f8fafc; padding: 1rem; border-radius: 1rem; outline: none; transition: all 0.3s ease;
        }
        .input-field:focus { border-color: #74C69D; box-shadow: 0 0 15px rgba(116, 198, 157, 0.2); transform: translateY(-2px); }

        /* Profile Radar Rings */
        .pulse-ring {
            position: absolute; border-radius: 50%; border: 1px solid rgba(116, 198, 157, 0.5);
            animation: pulseRing 3s ease-out infinite; z-index: 1; pointer-events: none;
        }
        .ring-1 { width: 120px; height: 120px; animation-delay: 0s; }
        .ring-2 { width: 160px; height: 160px; animation-delay: 1s; }
        .ring-3 { width: 200px; height: 200px; animation-delay: 2s; }

        @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Gallery Bar Animation */
        #gallery-bar {
            max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #gallery-bar.active { max-height: 100px; opacity: 1; margin-top: 1rem; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-12 overflow-x-hidden">

    <nav class="p-5 flex items-center gap-4 z-40 relative sticky top-0 bg-[#0B0C10]/80 backdrop-blur-md border-b border-white/5 shadow-md">
        <button onclick="window.location.href='home.html'" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-[#74C69D] active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="text-xl font-bold tracking-widest text-white uppercase">Identity Settings</h1>
    </nav>

    <main class="px-5 pt-8 max-w-md mx-auto space-y-8">
        
        <div class="flex flex-col items-center justify-center relative mt-4">
            <div class="relative flex items-center justify-center w-32 h-32 mb-4">
                <div class="pulse-ring ring-1"></div>
                <div class="pulse-ring ring-2"></div>
                <div class="pulse-ring ring-3"></div>
                
                <div id="profile-img-container" class="w-24 h-24 rounded-full bg-gradient-to-tr from-[#2D6A4F] to-[#74C69D] z-10 border-2 border-[#0B0C10] overflow-hidden flex items-center justify-center shadow-[0_0_30px_rgba(116,198,157,0.3)]">
                    <img id="profile-img" src="" class="w-full h-full object-cover hidden" alt="Profile">
                    <span id="profile-initial" class="text-4xl font-black text-[#0B0C10] uppercase">?</span>
                </div>
            </div>

            <button onclick="toggleGalleryBar()" class="z-10 bg-slate-800 border border-[#74C69D]/50 text-[#74C69D] text-xs font-bold px-4 py-2 rounded-full hover:bg-[#2D6A4F] hover:text-white transition-colors active:scale-95 shadow-lg">
                <span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> Edit Avatar</span>
            </button>

            <div id="gallery-bar" class="w-full glass-card rounded-2xl p-4 flex items-center justify-between border-l-4 border-[#74C69D]">
                <div class="text-sm text-slate-300">
                    <p class="font-bold text-white">Upload Image</p>
                    <p class="text-[10px] text-slate-500 uppercase">JPG, PNG (Preview Mode)</p>
                </div>
                <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="previewImage(event)">
                <label for="file-upload" class="bg-[#74C69D] text-[#0B0C10] px-4 py-2 rounded-xl font-bold text-xs cursor-pointer active:scale-95 transition-transform shadow-md">Browse</label>
            </div>
        </div>

        <div class="glass-card p-6 rounded-3xl space-y-5 shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#74C69D]/10 rounded-full blur-3xl pointer-events-none"></div>

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="text-xs font-semibold text-[#74C69D] uppercase tracking-wider block">Full Name</label>
                    <span class="text-[10px] text-slate-500 font-mono bg-slate-800 px-2 py-1 rounded-md">2/3 Edits Remaining</span>
                </div>
                <input type="text" id="user-name" placeholder="Loading..." class="input-field">
            </div>

            <div>
                <label class="text-xs font-semibold text-[#74C69D] uppercase tracking-wider mb-2 block">Profession / Title</label>
                <input type="text" id="user-profession" placeholder="e.g. Fintech Architect" class="input-field">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    Registered Email (Locked)
                </label>
                <input type="email" id="user-email" disabled class="input-field opacity-50 cursor-not-allowed bg-slate-900">
            </div>

            <button onclick="saveProfile()" id="save-btn" class="w-full mt-6 bg-[#74C69D] text-[#0B0C10] font-bold text-lg py-4 rounded-xl shadow-[0_0_15px_rgba(116,198,157,0.4)] active:scale-95 transition-all flex justify-center items-center">
                Sync to Cloud
            </button>
        </div>
    </main>

    <script>
        function toggleGalleryBar() {
            document.getElementById('gallery-bar').classList.toggle('active');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('profile-img');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('profile-initial').classList.add('hidden');
                    toggleGalleryBar(); 
                }
                reader.readAsDataURL(file);
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFaSTwrX38nSEPudYm-8iJLwdoJXGCfM8",
            authDomain: "strata-ca81c.firebaseapp.com",
            projectId: "strata-ca81c",
            storageBucket: "strata-ca81c.firebasestorage.app",
            messagingSenderId: "863301861425",
            appId: "1:863301861425:web:a3b02f32b262df517e5510"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => { 
            if (user) {
                currentUser = user;
                document.getElementById('user-email').value = user.email;
                
                const displayName = user.displayName || "User";
                document.getElementById('user-name').value = displayName;
                document.getElementById('profile-initial').innerText = displayName.charAt(0);

                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists() && docSnap.data().profession) {
                        document.getElementById('user-profession').value = docSnap.data().profession;
                    }
                } catch (e) { console.error("Error fetching profile:", e); }
            } else {
                window.location.href = 'auth.html';
            }
        });

        window.saveProfile = async function() {
            if(!currentUser) return;
            
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-pulse">Syncing...</span>`;
            
            const newName = document.getElementById('user-name').value;
            const newProf = document.getElementById('user-profession').value;

            try {
                await updateProfile(currentUser, { displayName: newName });
                
                await setDoc(doc(db, "users", currentUser.uid), {
                    profession: newProf,
                    lastUpdatedProfile: new Date().toISOString()
                }, { merge: true });

                btn.innerHTML = "Synced Successfully!";
                btn.classList.add('bg-white');
                document.getElementById('profile-initial').innerText = newName.charAt(0);
                
                setTimeout(() => { 
                    btn.innerHTML = originalText; 
                    btn.classList.remove('bg-white');
                }, 2000);
            } catch (error) {
                console.error(error);
                btn.innerHTML = "Error!";
                alert("Failed to save: " + error.message);
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            }
        }
    </script>
</body>
</html>
