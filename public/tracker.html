        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #2D6A4F 0%, #0B0C10 50%, #0B0C10 100%); background-attachment: fixed; overflow-x: hidden; }

        #results { max-height: 0; overflow: hidden; transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; opacity: 0; }
        #results.show { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }

        .weather-card { position: relative; overflow: hidden; }
        .particle { position: absolute; top: -30px; pointer-events: none; animation: fall linear infinite; }
        .snow { background: white; border-radius: 50%; opacity: 0.8; }
        .leaf { background: #d97706; border-radius: 0 50% 50% 50%; opacity: 0.7; transform: rotate(45deg); }
        .petal { background: #fbcfe8; border-radius: 50% 0 50% 50%; opacity: 0.8; }
        
        @keyframes fall { 
            0% { transform: translateY(0px) rotate(0deg) translateX(0); opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(350px) rotate(360deg) translateX(20px); opacity: 0; } 
        }
        
        .sun-glow { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 150px; height: 150px; background: radial-gradient(circle, rgba(253, 224, 71, 0.4) 0%, transparent 70%); animation: pulseSun 4s infinite alternate; pointer-events: none; }
        @keyframes pulseSun { 0% { transform: translateX(-50%) scale(1); opacity: 0.5; } 100% { transform: translateX(-50%) scale(1.5); opacity: 0.8; } }

        .bg-leaf {
            position: fixed;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
            bottom: -50px;
            animation: floatUpBg 15s linear infinite;
        }

        @keyframes floatUpBg {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
    <script>
        // Global Currency Configuration
        window.strataCurrency = 'INR';
        const currencyRates = {
            'INR': { rate: 1.0, symbol: '₹' },
            'USD': { rate: 0.012, symbol: '$' },
            'EUR': { rate: 0.011, symbol: '€' },
            'GBP': { rate: 0.0094, symbol: '£' },
            'JPY': { rate: 1.8, symbol: '¥' }
        };

        function formatCurrency(inrAmount) {
            const config = currencyRates[window.strataCurrency];
            const converted = inrAmount * config.rate;
            // For JPY, no decimals. For others, max 2 decimals.
            const decimals = window.strataCurrency === 'JPY' ? 0 : 2;
            const displayAmt = converted.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: decimals });
            return `${config.symbol}${displayAmt}`;
        }

        function changeCurrency(currencyCode) {
            window.strataCurrency = currencyCode;
            document.getElementById('currency-selector').value = currencyCode;
            // If calculator has results, re-render them
            if (typeof calculateImpact === 'function' && document.getElementById('results').classList.contains('show')) {
                calculateImpact();
            }
        }
        
        // Country to Timezone/Currency Map
        const countrySyncMap = {
            'local': { tz: Intl.DateTimeFormat().resolvedOptions().timeZone, curr: 'INR' },
            'usa': { tz: 'America/New_York', curr: 'USD' },
            'uk': { tz: 'Europe/London', curr: 'GBP' },
            'euro': { tz: 'Europe/Berlin', curr: 'EUR' },
            'japan': { tz: 'Asia/Tokyo', curr: 'JPY' }
        };

        function changeCountrySync(countryKey) {
            const config = countrySyncMap[countryKey];
            window.realtimeTimezone = config.tz;
            changeCurrency(config.curr); // Auto-adjust currency!
        }
    </script>

    <script>
        const weatherLayer = document.getElementById('weather-layer');
        const timeframeSection = document.getElementById('timeframe-section');

        function updateTimeframeUI() {
            const tf = document.getElementById('timeframe').value;
            const container = document.getElementById('dynamic-duration-container');
            weatherLayer.innerHTML = ''; 
            timeframeSection.style.borderColor = "rgba(255, 255, 255, 0.1)";
            timeframeSection.style.background = "rgba(255, 255, 255, 0.03)";
            
            if(tf === 'monthly') {
                container.innerHTML = `<label class="text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2 block">Select Month</label><select id="month-select" onchange="triggerWeather()" class="input-field appearance-none"><option value="1">January (Winter)</option><option value="2">February (Winter)</option><option value="3">March (Spring)</option><option value="4">April (Spring)</option><option value="5">May (Spring)</option><option value="6">June (Summer)</option><option value="7">July (Summer)</option><option value="8">August (Summer)</option><option value="9">September (Autumn)</option><option value="10">October (Autumn)</option><option value="11">November (Autumn)</option><option value="12">December (Winter)</option></select>`;
                triggerWeather(); 
            } else if (tf === 'quarterly') {
                container.innerHTML = `<label class="text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2 block">Select Quarter</label><select id="quarter-select" class="input-field appearance-none"><option value="Q1">Q1 (Jan - Mar)</option><option value="Q2">Q2 (Apr - Jun)</option><option value="Q3">Q3 (Jul - Sep)</option><option value="Q4">Q4 (Oct - Dec)</option></select>`;
            } else if (tf === 'yearly') {
                container.innerHTML = `<label class="text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2 block">Enter Year</label><input type="number" id="year-select" value="2026" class="input-field">`;
            }
        }

        function triggerWeather() {
            weatherLayer.innerHTML = ''; 
            const month = parseInt(document.getElementById('month-select').value) || 1;
            let type = ''; let count = 15;
            
            if(month === 12 || month === 1 || month === 2) { 
                type = 'snow'; timeframeSection.style.borderColor = "rgba(147, 197, 253, 0.3)"; timeframeSection.style.background = "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(147,197,253,0.1) 100%)";
            } else if(month >= 3 && month <= 5) { 
                type = 'petal'; timeframeSection.style.borderColor = "rgba(244, 114, 182, 0.3)"; timeframeSection.style.background = "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(244,114,182,0.1) 100%)";
            } else if(month >= 6 && month <= 8) { 
                weatherLayer.innerHTML = '<div class="sun-glow"></div>'; timeframeSection.style.borderColor = "rgba(253, 224, 71, 0.3)"; timeframeSection.style.background = "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(253,224,71,0.05) 100%)"; return;
            } else if(month >= 9 && month <= 11) { 
                type = 'leaf'; count = 10; timeframeSection.style.borderColor = "rgba(217, 119, 6, 0.3)"; timeframeSection.style.background = "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(217,119,6,0.1) 100%)";
            }

            for(let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = `particle ${type}`;
                const size = Math.random() * 8 + 4;
                p.style.width = `${size}px`; p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 3 + 2}s`;
                p.style.animationDelay = `${Math.random() * 2}s`;
                weatherLayer.appendChild(p);
            }
        }
        
        let isRealtime = false;
        document.addEventListener('DOMContentLoaded', () => {
            isRealtime = localStorage.getItem('realtimeMode') === 'on';
            if (isRealtime) {
                document.getElementById('timeframe-section').classList.add('hidden');
                document.getElementById('realtime-section').classList.remove('hidden');
                startLiveClock();
            } else {
                updateTimeframeUI();
            }
        });

        function startLiveClock() {
            function updateClock() {
                const now = new Date();
                const formatterTime = new Intl.DateTimeFormat('en-US', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
                    timeZone: window.realtimeTimezone || Intl.DateTimeFormat().resolvedOptions().timeZone
                });
                const formatterDate = new Intl.DateTimeFormat('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    timeZone: window.realtimeTimezone || Intl.DateTimeFormat().resolvedOptions().timeZone
                });
                document.getElementById('live-time-display').innerText = formatterTime.format(now);
                document.getElementById('live-date-display').innerText = formatterDate.format(now);
            }
            setInterval(updateClock, 1000);
            updateClock();
        }

        // Modal manual toggle controls
        window.openModal = function() {
            document.getElementById('conflict-modal').classList.remove('hidden');
            document.getElementById('conflict-modal').classList.add('flex');
        }
        window.closeModal = function() {
            document.getElementById('conflict-modal').classList.add('hidden');
            document.getElementById('conflict-modal').classList.remove('flex');
            document.getElementById('sync-status').innerText = "Sync Cancelled.";
        }
    </script>

            document.getElementById('co2-total').innerText = totalCO2;
                        // --- PORTFOLIO ALLOCATION ENGINE ---
            const suggestedInvestment = Math.round(totalCO2 * 15);
            const allocs = [
                {name: "Tata Power", perc: 0.30, color: "border-[#74C69D]"},
                {name: "Adani Green", perc: 0.25, color: "border-[#74C69D]"},
                {name: "IREDA", perc: 0.20, color: "border-[#74C69D]"},
                {name: "Suzlon Energy", perc: 0.15, color: "border-[#74C69D]"},
                {name: "Green Bonds", perc: 0.10, color: "border-slate-600 opacity-80"}
            ];
            
            const portDiv = document.getElementById('portfolio-alloc');
            portDiv.innerHTML = `<h3 class="text-sm font-semibold text-slate-300 mb-2">Offset Cost: ${formatCurrency(suggestedInvestment)}</h3>`;
            
            allocs.forEach(a => {
                const amt = Math.round(suggestedInvestment * a.perc);
                portDiv.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center border-l-4 ${a.color} shadow-lg">
                        <div><p class="font-bold text-sm text-white">${a.name}</p><p class="text-[10px] text-slate-500 uppercase tracking-wider">Allocation: ${a.perc*100}%</p></div>
                        <div class="text-right"><p class="font-mono text-sm text-[#74C69D] font-bold">${formatCurrency(amt)}</p></div>
                    </div>`;
            });
            
            // GREEN ADVICE (If Realtime)
            if (isRealtime && totalCO2 > 0) {
                const treesNeeded = Math.ceil(totalCO2 / 10); 
                const cycleKm = Math.ceil(totalCO2 / 0.2); 
                const recycleKg = Math.ceil(totalCO2 / 1.4); 

                portDiv.innerHTML += `
                    <h3 class="text-sm font-semibold text-[#74C69D] mt-6 mb-2 uppercase tracking-wider">Realtime Green Advice</h3>
                    <div class="grid grid-cols-1 gap-2">
                        <div class="glass-card p-3 rounded-xl border-l-4 border-emerald-500 shadow flex items-center justify-between">
                            <span class="text-white text-xs font-bold">&#127795; Plant Trees</span>
                            <span class="text-emerald-400 font-mono font-bold text-sm">${treesNeeded}</span>
                        </div>
                        <div class="glass-card p-3 rounded-xl border-l-4 border-blue-500 shadow flex items-center justify-between">
                            <span class="text-white text-xs font-bold">&#128690; Cycle Instead</span>
                            <span class="text-blue-400 font-mono font-bold text-sm">${cycleKm} km</span>
                        </div>
                        <div class="glass-card p-3 rounded-xl border-l-4 border-teal-500 shadow flex items-center justify-between">
                            <span class="text-white text-xs font-bold">&#9851; Recycle E-Waste</span>
                            <span class="text-teal-400 font-mono font-bold text-sm">${recycleKg} kg</span>
                        </div>
                    </div>
                `;
            }
            // ------------------------------------

            document.getElementById('results').classList.add('show');
            setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 300);

            const tf = document.getElementById('timeframe').value;
            let bucketName = "";
            let displayLabel = "";

            if (isRealtime) {
                const now = new Date();
                // Store exact time with 'realtime_' prefix
                bucketName = "realtime_" + now.toISOString();
                displayLabel = now.toLocaleString();
            } else if (tf === 'monthly') {
                const m = document.getElementById('month-select').value;
                bucketName = "month_" + m;
                const months = ["", "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                displayLabel = months[m];
            } else if (tf === 'quarterly') {
                const q = document.getElementById('quarter-select').value;
                bucketName = "quarter_" + q;
                displayLabel = q;
            } else if (tf === 'yearly') {
                const y = document.getElementById('year-select').value || "2026";
                bucketName = "year_" + y;
                displayLabel = "Year " + y;
            }

            try {
                const docRef = doc(db, "users", currentUser.uid);
                const docSnap = await getDoc(docRef);

                // STRICT CHECK: Does this bucket key already exist in the database with a valid number?
                if (docSnap.exists() && docSnap.data()[bucketName] != null) {
                    const existingVal = docSnap.data()[bucketName];
                    document.getElementById('modal-existing').innerText = existingVal;
                    document.getElementById('modal-label').innerText = displayLabel;
                    
                    window.pendingCloudData = { bucket: bucketName, newVal: totalCO2, oldVal: existingVal };
                    
                    // Trigger the rock-solid Tailwind Modal
                    window.openModal();
                    document.getElementById('sync-status').innerText = "Action required in popup...";
                } else {
                    await saveToCloud(bucketName, totalCO2);
                }
            } catch (e) { console.error(e); }
        }

        window.resolveConflict = async function(action) {
            window.closeModal();
            let finalCO2 = window.pendingCloudData.newVal;

            if (action === 'add') {
                finalCO2 = parseFloat((window.pendingCloudData.oldVal + window.pendingCloudData.newVal).toFixed(1));
            }
            await saveToCloud(window.pendingCloudData.bucket, finalCO2);
        }

        async function saveToCloud(bucketName, finalCO2) {
            document.getElementById('sync-status').innerHTML = `<span class="animate-pulse">Syncing...</span>`;
            const suggestedInvestment = Math.round(finalCO2 * 15);
            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    carbonFootprint: finalCO2, 
                    suggestedInvestment: suggestedInvestment,
                    lastUpdated: new Date().toISOString(),
                    [bucketName]: finalCO2 
                }, { merge: true });
                document.getElementById('sync-status').innerHTML = `Synced securely to ${bucketName.replace('_', ' ')}! &#9989;`;
                document.getElementById('co2-total').innerText = finalCO2; 
            } catch (e) {
                console.error("Cloud Error: ", e);
                document.getElementById('sync-status').innerText = "Cloud Sync Failed.";
            }
        }
    </script>
</body>
</html>
